<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>twin companion</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body class="window window-companion" data-window="companion">
    <main id="stage" class="stage" data-tauri-drag-region>
      <div id="pet" class="pet" data-tauri-drag-region>
        <img id="sprite" class="sprite" alt="" draggable="false" />
      </div>
      <div id="ambient-bubble" class="ambient-bubble" aria-live="polite" hidden></div>
      <div id="caption" class="caption" hidden></div>

      <div id="speech-bubble" class="speech-bubble" data-state="hidden" aria-live="polite">
        <div id="bubble-content" class="bubble-content"></div>
        <footer class="bubble-footer">
          <form id="bubble-form" class="bubble-form">
            <textarea
              id="bubble-input"
              class="bubble-input"
              placeholder="talk to your twin…"
              rows="1"
              autocomplete="off"
            ></textarea>
            <button id="bubble-send" class="bubble-send" type="submit">↑</button>
          </form>
          <button id="bubble-expand" class="bubble-expand" type="button" title="open in browser">
            expand ↗
          </button>
        </footer>
      </div>

      <div class="companion-actions">
        <button id="chat-button" class="chat-button" type="button" title="chat with twin">
          chat
        </button>
        <button
          id="web-button"
          class="chat-button web-button"
          type="button"
          title="open web companion in browser"
        >
          web
        </button>
      </div>
    </main>
    <script type="module" src="/src/companion.ts"></script>
  </body>
</html>

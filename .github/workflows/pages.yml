name: Deploy landing to GitHub Pages
on:
  push:
    branches: [main]
    paths:
      - 'apps/landing/**'
      - 'packages/core/assets/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Check for bare-root asset references
        run: |
          if grep -rEn '(href|src)="\/pets\/' apps/landing/src/ 2>/dev/null | grep -v 'BASE_URL'; then
            echo "ERROR: bare /pets/ reference found — update to use import.meta.env.BASE_URL"
            exit 1
          fi
      - name: Build landing
        run: pnpm --filter @twin-md/landing build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
